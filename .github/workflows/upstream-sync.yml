name: Upstream Sync

# Merges simstudioai/sim main into the branch that triggered the run via the Sandcastle harness.
# Polls daily; resumes when a reviewer replies `/upstream-sync resume` on the draft PR.
# Note: issue_comment events only run workflows present on the repository default branch.
# While validating this workflow from a feature branch, use workflow_dispatch with resume=true.
#
# push: activates workflow_dispatch on feature branches (must run once before
# `gh workflow run upstream-sync.yml --ref <branch>` works off default branch).

on:
  push:
    branches:
      - feat/github-merge-agent
    paths:
      - '.github/workflows/upstream-sync.yml'
      - '.sandcastle/**'
      - '.upstream-sync/**'
      - 'package.json'
      - 'bun.lock'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Run even when upstream SHA is unchanged
        type: boolean
        default: false
      resume:
        description: Resume an existing upstream-sync PR
        type: boolean
        default: false
      resume_pr:
        description: PR number to resume when using workflow_dispatch
        type: string
        required: false
      skip_agent:
        description: Skip Sandcastle agents (git merge + verify only)
        type: boolean
        default: false
      agent_provider:
        description: Agent provider (anthropic or openai)
        type: choice
        options:
          - anthropic
          - openai
        default: anthropic
  issue_comment:
    types: [created]

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM_REMOTE: upstream
  UPSTREAM_REPO: simstudioai/sim
  UPSTREAM_BRANCH: main
  # TEMP: explicit merge target while validating on feat/github-merge-agent.
  # Restore when validated: TARGET_BRANCH: version-4.2-main
  TARGET_BRANCH: feat/github-merge-agent
  # GitHub usernames (comma-separated). Set repo variable UPSTREAM_SYNC_PR_REVIEWERS
  # to the GitHub login for utcarsh.srivastava@position2.com (emails cannot be used).
  UPSTREAM_SYNC_PR_REVIEWERS: ${{ vars.UPSTREAM_SYNC_PR_REVIEWERS }}

jobs:
  gate:
    name: Should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      resume: ${{ steps.decide.outputs.resume }}
      force: ${{ steps.decide.outputs.force }}
      skip_agent: ${{ steps.decide.outputs.skip_agent }}
      agent_provider: ${{ steps.decide.outputs.agent_provider }}
    steps:
      - name: Decide trigger
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          COMMENT: ${{ github.event.comment.body }}
        run: |
          resume=false
          force=false
          skip_agent=true
          agent_provider=anthropic

          if [ "$EVENT" = "workflow_dispatch" ]; then
            force="${{ github.event.inputs.force == 'true' && 'true' || 'false' }}"
            resume="${{ github.event.inputs.resume == 'true' && 'true' || 'false' }}"
            skip_agent="${{ github.event.inputs.skip_agent == 'true' && 'true' || 'false' }}"
            agent_provider="${{ github.event.inputs.agent_provider || 'anthropic' }}"
          fi

          if [ "$EVENT" = "issue_comment" ]; then
            if echo "$COMMENT" | grep -q '/upstream-sync resume'; then
              resume=true
              skip_agent=false
              should_run=true
            else
              should_run=false
            fi
          elif [ "$EVENT" = "push" ] && echo "${{ github.ref_name }}" | grep -q '^upstream-sync/'; then
            # Harness pushes sync branches — do not re-enter the pipeline (wrong PR base).
            should_run=false
          else
            should_run=true
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "resume=$resume" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"
          echo "skip_agent=$skip_agent" >> "$GITHUB_OUTPUT"
          echo "agent_provider=$agent_provider" >> "$GITHUB_OUTPUT"

  sync:
    name: Upstream sync harness
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      # Fork repos: GITHUB_TOKEN often cannot create PRs — set GH_PAT (classic ghp_* token, repo scope).
      GH_TOKEN: ${{ secrets.GH_PAT || secrets.UPSTREAM_SYNC_GH_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.UPSTREAM_SYNC_GH_TOKEN || github.token }}

      - name: Checkout resume PR branch
        if: needs.gate.outputs.resume == 'true'
        env:
          COMMENT_PR_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.resume_pr }}
        run: |
          pr_number="${COMMENT_PR_NUMBER:-$DISPATCH_PR_NUMBER}"
          if [ -z "$pr_number" ]; then
            echo "resume=true requires resume_pr when using workflow_dispatch"
            exit 1
          fi
          branch=$(gh pr view "$pr_number" --json headRefName --jq .headRefName)
          git fetch origin "$branch"
          git checkout "$branch"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Configure git
        run: |
          git config user.name "upstream-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          else
            git remote add upstream "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          fi
          git fetch upstream "${{ env.UPSTREAM_BRANCH }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Claude Code CLI
        if: needs.gate.outputs.skip_agent != 'true' && needs.gate.outputs.agent_provider == 'anthropic'
        run: bun add -g @anthropic-ai/claude-code

      - name: Install Codex CLI
        if: needs.gate.outputs.skip_agent != 'true' && needs.gate.outputs.agent_provider == 'openai'
        run: bun add -g @openai/codex

      - name: Diagnose GitHub token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.UPSTREAM_SYNC_GH_TOKEN || github.token }}
        run: |
          if [ -n "${{ secrets.GH_PAT }}" ]; then
            echo "Token source: GH_PAT"
          elif [ -n "${{ secrets.UPSTREAM_SYNC_GH_TOKEN }}" ]; then
            echo "Token source: UPSTREAM_SYNC_GH_TOKEN"
          else
            echo "Token source: github.token"
          fi
          gh api user --jq '{login: .login, type: .type}'
          gh api -i user 2>&1 | grep -i '^x-oauth-scopes:' || echo "No x-oauth-scopes header (fine-grained or GITHUB_TOKEN)"

      - name: Run upstream sync harness
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          UPSTREAM_SYNC_GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_GH_TOKEN }}
          UPSTREAM_SYNC_AGENT: ${{ needs.gate.outputs.agent_provider }}
          UPSTREAM_SYNC_FORCE: ${{ needs.gate.outputs.force }}
          UPSTREAM_SYNC_RESUME: ${{ needs.gate.outputs.resume }}
          UPSTREAM_SYNC_SKIP_AGENT: ${{ needs.gate.outputs.skip_agent }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref || github.ref_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        run: bun run upstream-sync

      - name: Upload Sandcastle logs (if any)
        if: always()
        run: |
          if [ -d .sandcastle/logs ] && [ -n "$(ls -A .sandcastle/logs 2>/dev/null)" ]; then
            echo "has_logs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_logs=false" >> "$GITHUB_OUTPUT"
          fi
        id: sandcastle_logs

      - name: Upload Sandcastle log artifact
        if: always() && steps.sandcastle_logs.outputs.has_logs == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sandcastle-logs-${{ github.run_id }}
          path: .sandcastle/logs/
          retention-days: 14

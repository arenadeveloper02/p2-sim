name: Build and Push Images

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  resolve-ghcr-tag:
    name: Resolve GHCR Tag
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute next GHCR tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          TAG="$(bash scripts/ci/ghcr-next-branch-tag.sh "${{ github.ref_name }}")"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed GHCR tag: ${TAG}"

  build-ghcr-branch:
    name: Build GHCR Branch Images
    needs: [resolve-ghcr-tag]
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
          - dockerfile: ./docker/db.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
          - dockerfile: ./docker/realtime.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          IMAGE_TAG="${{ needs.resolve-ghcr-tag.outputs.image_tag }}"
          GHCR_IMAGE="${{ matrix.ghcr_image }}"
          echo "tags=${GHCR_IMAGE}:${IMAGE_TAG},${GHCR_IMAGE}:${IMAGE_TAG}-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=10240 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  build-amd64:
    name: Build AMD64
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
            ecr_repo_secret: ECR_APP
          - dockerfile: ./docker/db.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
            ecr_repo_secret: ECR_MIGRATIONS
          - dockerfile: ./docker/realtime.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime
            ecr_repo_secret: ECR_REALTIME
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="${{ secrets[matrix.ecr_repo_secret] }}"
          GHCR_IMAGE="${{ matrix.ghcr_image }}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:latest"
          GHCR_AMD64="${GHCR_IMAGE}:latest-amd64"
          GHCR_SHA="${GHCR_IMAGE}:${{ github.sha }}-amd64"
          echo "tags=${ECR_IMAGE},${GHCR_AMD64},${GHCR_SHA}" >> "$GITHUB_OUTPUT"

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=10240 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  build-ghcr-arm64:
    name: Build ARM64 (GHCR Only)
    runs-on: ubuntu-24.04-arm
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
          - dockerfile: ./docker/db.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
          - dockerfile: ./docker/realtime.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate ARM64 tags
        id: meta
        run: |
          IMAGE="${{ matrix.image }}"
          echo "tags=${IMAGE}:latest-arm64,${IMAGE}:${{ github.sha }}-arm64" >> "$GITHUB_OUTPUT"

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=10240 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push ARM64 to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  create-ghcr-manifests:
    name: Create GHCR Manifests
    runs-on: ubuntu-latest
    needs: [build-amd64, build-ghcr-arm64]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
          - image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
          - image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          IMAGE_BASE="${{ matrix.image }}"

          docker manifest create "${IMAGE_BASE}:latest" \
            "${IMAGE_BASE}:latest-amd64" \
            "${IMAGE_BASE}:latest-arm64"
          docker manifest push "${IMAGE_BASE}:latest"

          docker manifest create "${IMAGE_BASE}:${{ github.sha }}" \
            "${IMAGE_BASE}:${{ github.sha }}-amd64" \
            "${IMAGE_BASE}:${{ github.sha }}-arm64"
          docker manifest push "${IMAGE_BASE}:${{ github.sha }}"

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Check committed secrets
        run: bun run check:secrets

  test-build:
    name: Test and Build
    needs: [secret-scan]
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/staging'
    uses: ./.github/workflows/test-build.yml
    secrets: inherit

  # Resolve auto-incrementing GHCR tag for the production image branch (0.0.N)
  resolve-ghcr-tag:
    name: Resolve GHCR Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/version-4.2-prod'
    permissions:
      contents: read
      packages: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute next GHCR tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          TAG="$(bash scripts/ci/ghcr-next-branch-tag.sh)"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed GHCR tag: ${TAG}"

  # Detect if this is a version release commit (e.g., "v0.5.24: ...")
  detect-version:
    name: Detect Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_release: ${{ steps.extract.outputs.is_release }}
    steps:
      - name: Extract version from commit message
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Only tag versions on main branch
          if [ "$GITHUB_REF" = "refs/heads/main" ] && [[ "$COMMIT_MSG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+): ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "✅ Detected release commit: ${VERSION}"
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Not a release commit"
          fi

  # Run database migrations before images are pushed: the ECR push triggers
  # CodePipeline, so migrating first guarantees the schema is in place before
  # the new app version deploys (replaces the removed ECS migration sidecar)
  migrate:
    name: Migrate DB
    needs: [test-build]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    uses: ./.github/workflows/migrations.yml
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    secrets: inherit

  # Same ordering for dev (schema push before the dev image lands in ECR)
  migrate-dev:
    name: Migrate Dev DB
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/migrations.yml
    with:
      environment: dev
    secrets: inherit

  # version-4.2-prod: build all 3 images for GHCR with auto-increment tag
  build-ghcr-branch:
    name: Build GHCR Branch Images
    needs: [secret-scan, resolve-ghcr-tag]
    if: github.event_name == 'push' && github.ref == 'refs/heads/version-4.2-prod'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
          - dockerfile: ./docker/db.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
          - dockerfile: ./docker/realtime.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          IMAGE_TAG="${{ needs.resolve-ghcr-tag.outputs.image_tag }}"
          GHCR_IMAGE="${{ matrix.ghcr_image }}"
          echo "tags=${GHCR_IMAGE}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=20480 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}-amd64
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  # Dev: build all 3 images for ECR only (no ARM64)
  build-dev:
    name: Build Dev ECR
    needs: [secret-scan, detect-version, migrate-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            ecr_repo_secret: ECR_APP
          - dockerfile: ./docker/db.Dockerfile
            ecr_repo_secret: ECR_MIGRATIONS
          - dockerfile: ./docker/realtime.Dockerfile
            ecr_repo_secret: ECR_REALTIME
          - dockerfile: ./docker/pii.Dockerfile
            ecr_repo_secret: ECR_PII
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR repo name
        id: ecr-repo
        run: echo "name=$ECR_REPO" >> $GITHUB_OUTPUT
        env:
          ECR_REPO: ${{ matrix.ecr_repo_secret == 'ECR_APP' && secrets.ECR_APP || matrix.ecr_repo_secret == 'ECR_MIGRATIONS' && secrets.ECR_MIGRATIONS || matrix.ecr_repo_secret == 'ECR_REALTIME' && secrets.ECR_REALTIME || matrix.ecr_repo_secret == 'ECR_PII' && secrets.ECR_PII || '' }}

      - name: Generate tags
        id: meta
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ steps.ecr-repo.outputs.name }}:dev"
          echo "tags=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=20480 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Generate tags
        id: meta
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ steps.ecr-repo.outputs.name }}:dev"
          echo "tags=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=20480 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}-amd64
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  # Dev: deploy Trigger.dev background tasks to the preview "dev-sim" branch.
  # Gated after migrate-dev for the same reason as build-dev — the new task
  # code runs against the dev DB, so the schema must be pushed first.
  deploy-trigger-dev:
    name: Deploy Trigger.dev (Dev)
    needs: [migrate-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Trigger.dev
        working-directory: ./apps/sim
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.DEV_TRIGGER_ACCESS_TOKEN }}
          TRIGGER_PROJECT_ID: ${{ secrets.TRIGGER_PROJECT_ID }}
        run: |
          if [ -z "$TRIGGER_ACCESS_TOKEN" ] || [ -z "$TRIGGER_PROJECT_ID" ]; then
            echo "ERROR: DEV_TRIGGER_ACCESS_TOKEN and TRIGGER_PROJECT_ID repo secrets must both be set" >&2
            exit 1
          fi
          bunx trigger.dev@4.4.3 deploy --env preview --branch dev-sim

  # Main/staging: build AMD64 images and push to ECR + GHCR
  build-amd64:
    name: Build AMD64
    needs: [secret-scan, test-build, detect-version, migrate]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
            ecr_repo_secret: ECR_APP
          - dockerfile: ./docker/db.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
            ecr_repo_secret: ECR_MIGRATIONS
          - dockerfile: ./docker/realtime.Dockerfile
            ghcr_image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime
            ecr_repo_secret: ECR_REALTIME
          - dockerfile: ./docker/pii.Dockerfile
            ghcr_image: ghcr.io/simstudioai/pii
            ecr_repo_secret: ECR_PII
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ github.ref == 'refs/heads/main' && secrets.AWS_ROLE_TO_ASSUME || secrets.STAGING_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.ref == 'refs/heads/main' && secrets.AWS_REGION || secrets.STAGING_AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR repo name
        id: ecr-repo
        run: echo "name=$ECR_REPO" >> $GITHUB_OUTPUT
        env:
          ECR_REPO: ${{ matrix.ecr_repo_secret == 'ECR_APP' && secrets.ECR_APP || matrix.ecr_repo_secret == 'ECR_MIGRATIONS' && secrets.ECR_MIGRATIONS || matrix.ecr_repo_secret == 'ECR_REALTIME' && secrets.ECR_REALTIME || matrix.ecr_repo_secret == 'ECR_PII' && secrets.ECR_PII || '' }}

      - name: Generate tags
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="${{ steps.ecr-repo.outputs.name }}"
          GHCR_IMAGE="${{ matrix.ghcr_image }}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ECR_TAG="latest"
          else
            ECR_TAG="staging"
          fi
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${ECR_TAG}"

          TAGS="${ECR_IMAGE}"

          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "$GHCR_IMAGE" ]; then
            GHCR_AMD64="${GHCR_IMAGE}:latest-amd64"
            GHCR_SHA="${GHCR_IMAGE}:${{ github.sha }}-amd64"
            TAGS="${TAGS},$GHCR_AMD64,$GHCR_SHA"

            if [ "${{ needs.detect-version.outputs.is_release }}" = "true" ]; then
              VERSION="${{ needs.detect-version.outputs.version }}"
              GHCR_VERSION="${GHCR_IMAGE}:${VERSION}-amd64"
              TAGS="${TAGS},$GHCR_VERSION"
              echo "📦 Adding version tag: ${VERSION}-amd64"
            fi
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=20480 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}-amd64
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  # Build ARM64 images for GHCR (main branch only, runs in parallel)
  build-ghcr-arm64:
    name: Build ARM64 (GHCR Only)
    needs: [secret-scan, detect-version]
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: write
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/app.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
          - dockerfile: ./docker/db.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
          - dockerfile: ./docker/realtime.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate ARM64 tags
        id: meta
        run: |
          IMAGE="${{ matrix.image }}"
          TAGS="${IMAGE}:latest-arm64,${IMAGE}:${{ github.sha }}-arm64"

          # Add version tag if this is a release commit
          if [ "${{ needs.detect-version.outputs.is_release }}" = "true" ]; then
            VERSION="${{ needs.detect-version.outputs.version }}"
            TAGS="${TAGS},${IMAGE}:${VERSION}-arm64"
            echo "📦 Adding version tag: ${VERSION}-arm64"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Add swap
        run: |
          SWAPFILE=/mnt/gh-actions-swap
          if sudo swapon --show=NAME | awk -v file="$SWAPFILE" '$1 == file { found = 1 } END { exit !found }'; then
            echo "$SWAPFILE is already active"
            free -h
            exit 0
          fi
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=20480 status=none
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Build and push ARM64 to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}-arm64
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          provenance: false
          sbom: false

  # Create GHCR multi-arch manifests (only for main, after both builds)
  create-ghcr-manifests:
    name: Create GHCR Manifests
    runs-on: ubuntu-latest
    needs: [build-amd64, build-ghcr-arm64, detect-version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - image: ghcr.io/${{ github.repository_owner }}/p2-sim-simstudio
          - image: ghcr.io/${{ github.repository_owner }}/p2-sim-migrations
          - image: ghcr.io/${{ github.repository_owner }}/p2-sim-realtime

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          IMAGE_BASE="${{ matrix.image }}"

          # Create latest manifest
          docker manifest create "${IMAGE_BASE}:latest" \
            "${IMAGE_BASE}:latest-amd64" \
            "${IMAGE_BASE}:latest-arm64"
          docker manifest push "${IMAGE_BASE}:latest"

          # Create SHA manifest
          docker manifest create "${IMAGE_BASE}:${{ github.sha }}" \
            "${IMAGE_BASE}:${{ github.sha }}-amd64" \
            "${IMAGE_BASE}:${{ github.sha }}-arm64"
          docker manifest push "${IMAGE_BASE}:${{ github.sha }}"

          # Create version manifest if this is a release commit
          if [ "${{ needs.detect-version.outputs.is_release }}" = "true" ]; then
            VERSION="${{ needs.detect-version.outputs.version }}"
            echo "📦 Creating version manifest: ${VERSION}"
            docker manifest create "${IMAGE_BASE}:${VERSION}" \
              "${IMAGE_BASE}:${VERSION}-amd64" \
              "${IMAGE_BASE}:${VERSION}-arm64"
            docker manifest push "${IMAGE_BASE}:${VERSION}"
          fi

  # Check if docs changed
  check-docs-changes:
    name: Check Docs Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      docs_changed: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Need at least 2 commits to detect changes
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docs:
              - 'apps/docs/content/docs/en/**'
              - 'apps/sim/scripts/process-docs.ts'
              - 'apps/sim/lib/chunkers/**'

  # Process docs embeddings (only when docs change, after ECR images are pushed)
  process-docs:
    name: Process Docs
    needs: [build-amd64, check-docs-changes]
    if: needs.check-docs-changes.outputs.docs_changed == 'true'
    uses: ./.github/workflows/docs-embeddings.yml
    secrets: inherit

  # Create GitHub Release (only for version commits on main, after all builds complete)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-ghcr-manifests, detect-version]
    if: needs.detect-version.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: bun run scripts/create-single-release.ts ${{ needs.detect-version.outputs.version }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We're making updates – Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f3f4f8;
      min-height: 100vh;
      display: flex;
    }

    /* Blurred background screenshot */
    .bg-screenshot {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('https://www.figma.com/api/mcp/asset/fce5f433-7d26-4a50-9e19-c3a6ba8f1d96');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Blur overlay */
    .blur-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(243, 248, 254, 0.85);
      backdrop-filter: blur(17px);
      -webkit-backdrop-filter: blur(17px);
      z-index: 1;
    }

    /* ── Maintenance modal ───────────────────────────────────── */
    .modal-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: self-start;
      justify-content: center;
      z-index: 20;
      margin-top: 6%;
    }

    .modal {
      background: white;
      border-radius: 8px;
      padding: 40px;
      width: 468px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 0 4px 24px rgba(109, 113, 127, 0.15);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .modal-logo {
      width: 74px;
      height: 80px;
      object-fit: contain;
      position: relative;
      top: 10px;
      right: 10px;
    }

    .modal-illustration {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: #2c2d33;
      line-height: 28px;
    }

    .modal-description {
      font-size: 14px;
      font-weight: 400;
      color: #41444c;
      line-height: 22px;
    }
  </style>
</head>
<body>

  <!-- Background screenshot layer -->
  <div class="bg-screenshot" aria-hidden="true"></div>
  <!-- Blur overlay -->
  <div class="blur-overlay" aria-hidden="true"></div>


  <!-- Maintenance modal (centered over blur) -->
  <div class="modal-wrapper" role="main">
    <div class="modal" role="dialog" aria-labelledby="maintenance-title" aria-describedby="maintenance-desc">
      <div class="modal-header">
        <img
          class="modal-logo"
          src="https://arenav2image.s3.us-west-1.amazonaws.com/rt/calibrate/Arena_Logo_WebDashboard.svg"
          alt="Arena"
        />
        <img
          class="modal-illustration"
          src="https://arenav2image.s3.us-west-1.amazonaws.com/arena_making_updates.gif"
          alt=""
          aria-hidden="true"
        />
      </div>
      <div class="modal-body">
        <h1 class="modal-title" id="maintenance-title">We're making updates</h1>
        <p class="modal-description" id="maintenance-desc">
          We're sprucing things up. Check back in a few minutes.<br />
          Thank you for your patience.
        </p>
      </div>
    </div>
  </div>

</body>

<script>
  (function () {
    var REFRESH_INTERVAL_MS = 2 * 60 * 1000; // 2 minutes

    function refreshWithCacheBust() {
      window.location.reload();
    }

    setInterval(function () {
      // Avoid refreshing a background tab; refresh once when it becomes visible again.
      if (document.visibilityState === 'visible') refreshWithCacheBust();
    }, REFRESH_INTERVAL_MS);

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') refreshWithCacheBust();
    });
  })();
</script>
</html>

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Do not answer the real app's health check with HTML during maintenance (would be 200 + wrong body).
    location = /api/health {
        default_type text/plain;
        return 503 "maintenance\n";
    }

    # Preserve the browser URL (e.g. /workspace/...) while serving the maintenance page for any path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
